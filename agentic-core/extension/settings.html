<!DOCTYPE html>
<!-- extension/settings.html -->
<html>
<head>
  <meta charset="utf-8">
  <title>Settings — AI Job Hunter Agent</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 100%;
      max-width: 500px;
      margin: 40px auto;
      background-color: #121212;
      padding: 24px;
      border: 1px solid #2d2d2d;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <!-- Back button to return to dashboard -->
  <a href="#" id="btn-back" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12" />
      <polyline points="12 19 5 12 12 5" />
    </svg>
    Close Settings
  </a>

  <header>
    <h1>Agent Settings</h1>
  </header>

  <div class="settings-container">
    <div class="form-group">
      <label for="fastapi-url">FastAPI Base URL</label>
      <input type="text" id="fastapi-url" placeholder="http://localhost:8000">
    </div>

    <div class="form-group">
      <label for="supabase-url">Supabase Project URL</label>
      <input type="text" id="supabase-url" placeholder="https://xxxx.supabase.co">
    </div>

    <div class="form-group">
      <label for="supabase-key">Supabase Anon Key</label>
      <input type="password" id="supabase-key" placeholder="eyJhbGciOiJIUzI1Ni...">
    </div>

    <div class="form-group">
      <label for="telegram-token">Telegram Bot Token</label>
      <input type="password" id="telegram-token" placeholder="123456:ABC-DEF...">
    </div>

    <div class="form-group">
      <label for="telegram-chat-id">Telegram Chat ID</label>
      <input type="text" id="telegram-chat-id" placeholder="1478271776">
    </div>

    <div class="form-group">
      <label for="telegram-channels">Telegram Channels (comma-separated)</label>
      <input type="text" id="telegram-channels" placeholder="@ITR213, @rcrdz1, @TechJobsOccean">
    </div>

    <div class="form-group">
      <label for="gemini-key">Gemini API Key</label>
      <input type="password" id="gemini-key" placeholder="AIzaSy...">
    </div>

    <button id="btn-save" class="btn btn-primary" style="margin-top: 10px; width: 100%;">Save Configurations</button>
    <div id="alert-success" class="alert-success">Settings saved successfully!</div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
