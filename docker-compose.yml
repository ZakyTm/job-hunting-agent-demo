version: "3.9"

networks:
  agent-net:
    driver: bridge

services:
  fastapi:
    build:
      context: ./agentic-core
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./agentic-core/.env
    environment:
      # Scheduling interval (hours) — how often to scrape Telegram channels
      - SCRAPE_INTERVAL_HOURS=2
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
